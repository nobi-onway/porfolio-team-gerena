<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPC STUDIO — Team Portfolio</title>

  <!-- Tailwind CSS (CDN) + cấu hình theme -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>

  <!-- Fonts: Oswald (display) + Be Vietnam Pro (body) + Patrick Hand (doodle) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Patrick+Hand&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Custom styles (Arcade × Đông Sơn) -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg-paper bg-grain relative no-select">

  <!-- ===== SVG FILTER dùng chung: ảnh chim Lạc ĐEN trên nền TRẮNG → vàng đồng, nền trong suốt
       Bước 1 (feColorMatrix): alpha = 1 − luminance (đen → đặc, trắng → biến mất);
                               RGB ép về màu vàng đồng #C8AA6E.
       Bước 2 (feComponentTransfer): nắn cong alpha — cắt nhiễu JPEG quanh mép (alpha thấp → 0)
                               và làm đặc thân chim (alpha cao → 1), mép vẫn mượt. ===== -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <!-- x/y/width/height khóa vùng filter ĐÚNG bằng ảnh: pixel ngoài ảnh (đen-trong-suốt)
           không bị tô vàng thành khung. feComposite "in" cắt kết quả theo alpha ảnh gốc. -->
      <filter id="birdGold" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feColorMatrix type="matrix" values="
          0 0 0 0 0.784
          0 0 0 0 0.667
          0 0 0 0 0.431
          -0.299 -0.587 -0.114 0 1" />
        <feComponentTransfer>
          <feFuncA type="table" tableValues="0 0 0.12 0.65 1 1" />
        </feComponentTransfer>
        <feComposite in2="SourceGraphic" operator="in" />
      </filter>
      <!-- Bản VÀNG SÁNG cho chim trên trống đồng (khớp --drum: #DCC08A = 0.863/0.753/0.541) -->
      <filter id="birdDrum" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feColorMatrix type="matrix" values="
          0 0 0 0 0.863
          0 0 0 0 0.753
          0 0 0 0 0.541
          -0.299 -0.587 -0.114 0 1" />
        <feComponentTransfer>
          <feFuncA type="table" tableValues="0 0 0.12 0.65 1 1" />
        </feComponentTransfer>
        <feComposite in2="SourceGraphic" operator="in" />
      </filter>
    </defs>
  </svg>

  <!-- ===== LỚP NỀN (đen arcade + họa tiết Đông Sơn, ảnh nền phải cuộn theo slide) ===== -->
  <div id="sceneLayer" class="absolute inset-0 z-0 overflow-hidden"></div>

  <!-- ===== TRỐNG ĐỒNG LỚN (nền, tâm giữa cạnh trái) ===== -->
  <div id="drumLayer" class="absolute inset-0 z-[5] overflow-hidden pointer-events-none"></div>

  <!-- ===== Icon game rơi (controller / coin / chim Lạc) ===== -->
  <div id="petals" class="absolute inset-0 z-[12] overflow-hidden pointer-events-none"></div>

  <!-- ===== Vệt mực bám theo con trỏ (1 trail liền, vẽ động) ===== -->
  <svg id="windFx" class="fixed inset-0 z-[14] overflow-visible pointer-events-none" aria-hidden="true">
    <defs>
      <!-- ink trail: vàng đồng → đỏ son, flat -->
      <linearGradient id="windFade" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#C8AA6E" stop-opacity="0.0" />
        <stop offset="0.35" stop-color="#C8AA6E" stop-opacity="0.35" />
        <stop offset="0.7" stop-color="#BE1E37" stop-opacity="0.45" />
        <stop offset="1" stop-color="#C8AA6E" stop-opacity="0.7" />
      </linearGradient>
      <!-- mép doodle: nhiễu + xô lệch nhẹ -->
      <filter id="inkBleed" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.09 0.11" numOctaves="2" seed="11" result="n" />
        <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
    <path id="windTrail" fill="url(#windFade)" stroke="none" filter="url(#inkBleed)" />
  </svg>

  <!-- ===== Khung viền góc (bracket vàng đồng, flat) ===== -->
  <div class="frame-corner top-6 left-6 border-t border-l"></div>
  <div class="frame-corner top-6 right-6 border-t border-r"></div>
  <div class="frame-corner bottom-6 left-6 border-b border-l"></div>
  <div class="frame-corner bottom-6 right-6 border-b border-r"></div>

  <!-- ===== Header thương hiệu ===== -->
  <header id="siteHeader"
    class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-10 md:px-16 py-7 no-select">
    <div class="flex items-center gap-3">
      <!-- Logo: sao 12 cánh trống đồng -->
      <svg width="34" height="34" viewBox="0 0 40 40" class="opacity-90" aria-hidden="true">
        <circle cx="20" cy="20" r="19" fill="none" stroke="#C8AA6E" stroke-width="1.5" />
        <polygon
          points="20,4 21.7,13.7 28,6.1 24.6,15.4 33.9,12 26.3,18.3 36,20 26.3,21.7 33.9,28 24.6,24.6 28,33.9 21.7,26.3 20,36 18.3,26.3 12,33.9 15.4,24.6 6.1,28 13.7,21.7 4,20 13.7,18.3 6.1,12 15.4,15.4 12,6.1 18.3,13.7"
          fill="#C8AA6E" />
      </svg>
      <div class="leading-tight">
        <div class="font-display text-ink text-lg md:text-xl font-bold tracking-widest">NPC</div>
        <div class="text-[10px] tracking-[0.4em] text-ink/50">GAME STUDIO</div>
      </div>
    </div>

    <!-- Tiêu đề slide hiện tại — căn GIỮA viewport -->
    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none">
      <div class="member-name-wrap flex items-center justify-center gap-3 md:gap-4">
        <span class="name-rule"></span>
        <h1 id="memberName"
          class="font-display name-ink uppercase text-3xl md:text-5xl lg:text-6xl tracking-wide leading-none">
        </h1>
        <span class="name-rule"></span>
      </div>
    </div>

    <!-- Nhãn phụ slide hiện tại -->
    <div class="hidden md:flex items-center gap-2 text-[11px] tracking-[0.35em] text-ink/55 font-body">
      <span class="seal-mini">★</span>
      <span id="memberRole" class="transition-all duration-500">TEAM PORTFOLIO</span>
    </div>
  </header>

  <!-- ===== Nav dots ===== -->
  <nav id="navDots" class="absolute right-8 md:right-12 top-1/2 -translate-y-1/2 z-30 flex flex-col gap-5 items-center">
  </nav>

  <!-- ===== Progress: thanh XP dọc + số ===== -->
  <div id="sideProgress"
    class="absolute left-5 md:left-8 top-1/2 -translate-y-1/2 z-30 no-select flex flex-row items-center gap-3">
    <div class="progress-num font-display text-ink/65 text-sm">
      <span id="curIdx">01</span>
      <span class="text-ink/30">/</span>
      <span id="totalIdx" class="text-ink/40">03</span>
    </div>
    <div class="xp-bar w-[6px] h-32 relative overflow-hidden">
      <div id="progressBar" class="absolute top-0 left-0 w-full bg-seal transition-all duration-700" style="height:33%">
      </div>
    </div>
  </div>

  <!-- ===== STAGE: nơi các slide hiện ===== -->
  <main id="stage" class="absolute inset-0 z-10"></main>

  <!-- ===== Scroll hint ===== -->
  <div id="scrollHint"
    class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-2 no-select transition-opacity duration-500">
    <span class="text-[11px] tracking-[0.3em] text-ink/50">SCROLL TO EXPLORE</span>
    <!-- Con chuột máy tính: con lăn đỏ chạy lên xuống -->
    <svg class="mouse-hint" width="22" height="34" viewBox="0 0 24 38" fill="none" aria-hidden="true">
      <rect x="1" y="1" width="22" height="36" rx="11" fill="none" stroke="#C8AA6E" stroke-width="1.6" />
      <rect class="mouse-wheel" x="10.5" y="7" width="3" height="7" rx="1.5" fill="#BE1E37" />
    </svg>
  </div>

  <!-- ===== Loading curtain (màn hình nạp arcade) ===== -->
  <div id="curtain">
    <div class="text-center">
      <svg width="60" height="60" viewBox="0 0 40 40" class="mx-auto mb-4 animate-pulse" aria-hidden="true">
        <circle cx="20" cy="20" r="19" fill="none" stroke="#C8AA6E" stroke-width="1.5" />
        <polygon
          points="20,4 21.7,13.7 28,6.1 24.6,15.4 33.9,12 26.3,18.3 36,20 26.3,21.7 33.9,28 24.6,24.6 28,33.9 21.7,26.3 20,36 18.3,26.3 12,33.9 15.4,24.6 6.1,28 13.7,21.7 4,20 13.7,18.3 6.1,12 15.4,15.4 12,6.1 18.3,13.7"
          fill="#C8AA6E" />
      </svg>
      <div class="font-display text-gold tracking-[0.4em] text-sm">BOOTING...</div>
    </div>
  </div>

  <!-- ===== System Diagnostic Modal ===== -->
  <div id="gameModal"
    class="fixed inset-0 z-[90] bg-black/80 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300"
    aria-hidden="true">
    <section id="gameModalBox"
      class="diag-modal w-[80vw] h-[80vh] opacity-0 scale-95 pointer-events-none transition-all duration-300"
      role="dialog" aria-modal="true" aria-labelledby="gameModalTitle">
      <div class="diag-modal__bar">
        <span class="diag-modal__status font-display">● SYSTEM_DIAGNOSTIC_RUNNING...</span>
        <button id="gameModalClose" class="diag-modal__close font-display" type="button">[ESC] CLOSE_</button>
      </div>
      <div id="gameModalContent" class="diag-modal__content overflow-y-auto"></div>
    </section>
  </div>

  <!-- ===== Scripts (thứ tự: data -> render -> scenery -> main) ===== -->
  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/scenery.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
