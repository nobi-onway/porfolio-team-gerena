<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ĐẠI VIỆT STUDIO — Team Portfolio</title>

  <!-- Tailwind CSS (CDN) + cấu hình theme -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>

  <!-- Fonts: serif thư pháp cho heading + sans gọn cho body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Lobster&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Custom styles (Thủy Mặc) -->
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg-paper bg-grain relative no-select">

  <!-- ===== SVG FILTER: mép giấy rách / bờ cọ (dùng cho .info-block) ===== -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <filter id="paperEdge">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.014" numOctaves="3" seed="7" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="9" xChannelSelector="R" yChannelSelector="G" />
      </filter>
      <filter id="paperEdgeSoft">
        <feTurbulence type="fractalNoise" baseFrequency="0.02 0.018" numOctaves="2" seed="3" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <!-- ===== LỚP NỀN CẢNH (cuộn tranh thủy mặc dọc) ===== -->
  <div id="sceneLayer" class="absolute inset-0 z-0 overflow-hidden"></div>

  <!-- ===== TRỐNG ĐỒNG LỚN (nền, tâm giữa cạnh trái) ===== -->
  <div id="drumLayer" class="absolute inset-0 z-[5] overflow-hidden pointer-events-none"></div>

  <!-- ===== Vết mực loang nền tĩnh ===== -->
  <div class="ink-wash ink-wash-1" aria-hidden="true"></div>
  <div class="ink-wash ink-wash-2" aria-hidden="true"></div>

  <!-- ===== Cánh hoa / lá rơi ===== -->
  <div id="petals" class="absolute inset-0 z-[12] overflow-hidden pointer-events-none"></div>

  <!-- ===== Vệt mực bám theo con trỏ (1 trail liền, vẽ động) ===== -->
  <svg id="windFx" class="fixed inset-0 z-[14] overflow-visible pointer-events-none" aria-hidden="true">
    <defs>
      <!-- mực loãng: đậm không đều dọc nét, đuôi nhạt nhưng KHÔNG về 0 hẳn -->
      <linearGradient id="windFade" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#1c1a17" stop-opacity="0.08" />
        <stop offset="0.22" stop-color="#1c1a17" stop-opacity="0.5" />
        <stop offset="0.45" stop-color="#2a2620" stop-opacity="0.34" />
        <stop offset="0.68" stop-color="#1c1a17" stop-opacity="0.62" />
        <stop offset="1" stop-color="#1c1a17" stop-opacity="0.78" />
      </linearGradient>
      <!-- mép mực thấm giấy: nhiễu + xô lệch nhẹ -->
      <filter id="inkBleed" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.09 0.11" numOctaves="2" seed="11" result="n" />
        <feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
    <path id="windTrail" fill="url(#windFade)" stroke="none" filter="url(#inkBleed)" />
  </svg>

  <!-- ===== Khung viền mực ===== -->
  <div class="frame-corner top-6 left-6 border-t border-l"></div>
  <div class="frame-corner top-6 right-6 border-t border-r"></div>
  <div class="frame-corner bottom-6 left-6 border-b border-l"></div>
  <div class="frame-corner bottom-6 right-6 border-b border-r"></div>

  <!-- ===== Header thương hiệu ===== -->
  <header class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between px-10 md:px-16 py-7 no-select">
    <div class="flex items-center gap-3">
      <svg width="34" height="34" viewBox="0 0 40 40" class="opacity-90">
        <polygon points="20,3 37,20 20,37 3,20" fill="none" stroke="#1c1a17" stroke-width="1.5" />
        <polygon points="20,11 29,20 20,29 11,20" fill="#b5362a" stroke="#1c1a17" stroke-width="1" />
      </svg>
      <div class="leading-tight">
        <div class="font-display text-ink text-lg md:text-xl font-bold tracking-widest">THIÊN DI</div>
        <div class="text-[10px] tracking-[0.4em] text-ink/50">GAME STUDIO</div>
      </div>
    </div>

    <!-- Tên thành viên hiện tại — căn GIỮA viewport (định vị tuyệt đối) -->
    <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none">
      <div class="member-name-wrap flex items-center justify-center gap-3 md:gap-4">
        <span class="name-rule"></span>
        <h1 id="memberName" class="font-display name-ink text-3xl md:text-4xl lg:text-5xl tracking-wide leading-none">
        </h1>
        <span class="name-rule"></span>
      </div>
    </div>

    <!-- Role thành viên hiện tại — thay cho "THE GUILD OF MAKERS" -->
    <div class="hidden md:flex items-center gap-2 text-[11px] tracking-[0.35em] text-ink/55 font-body">
      <span class="seal-mini">印</span>
      <span id="memberRole" class="transition-all duration-500">THE GUILD OF MAKERS</span>
    </div>
  </header>

  <!-- ===== Nav dots ===== -->
  <nav id="navDots" class="absolute right-8 md:right-12 top-1/2 -translate-y-1/2 z-30 flex flex-col gap-5 items-center">
  </nav>

  <!-- ===== Progress: số dọc nằm CẠNH thanh ===== -->
  <div class="absolute left-5 md:left-8 top-1/2 -translate-y-1/2 z-30 no-select flex flex-row items-center gap-3">
    <div class="progress-num font-display text-ink/65 text-sm">
      <span id="curIdx">01</span>
      <span class="text-ink/30">/</span>
      <span id="totalIdx" class="text-ink/40">05</span>
    </div>
    <div class="w-[2px] h-32 bg-ink/15 relative overflow-hidden rounded">
      <div id="progressBar"
        class="absolute top-0 left-0 w-full bg-gradient-to-b from-seal to-seal-dark transition-all duration-700"
        style="height:20%"></div>
    </div>
  </div>

  <!-- ===== STAGE: nơi các card hiện ===== -->
  <main id="stage" class="absolute inset-0 z-10"></main>

  <!-- ===== Scroll hint ===== -->
  <div id="scrollHint"
    class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center gap-2 no-select transition-opacity duration-500">
    <span class="text-[11px] tracking-[0.3em] text-ink/50">CUỘN ĐỂ KHÁM PHÁ</span>
    <!-- Con chuột máy tính: thân mực, con lăn (scroll) tô đỏ chạy lên xuống -->
    <svg class="mouse-hint" width="22" height="34" viewBox="0 0 24 38" fill="none" aria-hidden="true">
      <rect x="1" y="1" width="22" height="36" rx="11" fill="none" stroke="#1c1a17" stroke-width="1.6" />
      <rect class="mouse-wheel" x="10.5" y="7" width="3" height="7" rx="1.5" fill="#b5362a" />
    </svg>
  </div>

  <!-- ===== Modal Cột Mốc — chi tiết khi click triện ===== -->
  <div id="msModal" class="ms-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="msModalTitle">
    <div class="ms-modal__backdrop" data-ms-close></div>
    <div class="ms-modal__paper" role="document">
      <button class="ms-modal__close" type="button" data-ms-close aria-label="Đóng">×</button>
      <div class="ms-modal__year font-display" id="msModalYear"></div>
      <div class="ms-modal__rule" aria-hidden="true"></div>
      <h3 class="ms-modal__title font-display" id="msModalTitle"></h3>
      <p class="ms-modal__detail" id="msModalDetail"></p>
      <div class="ms-modal__seal" aria-hidden="true">印</div>
    </div>
  </div>

  <!-- ===== Loading curtain ===== -->
  <div id="curtain">
    <div class="text-center">
      <svg width="60" height="60" viewBox="0 0 40 40" class="mx-auto mb-4 animate-pulse">
        <polygon points="20,3 37,20 20,37 3,20" fill="none" stroke="#1c1a17" stroke-width="1.5" />
        <polygon points="20,11 29,20 20,29 11,20" fill="#b5362a" stroke="#1c1a17" stroke-width="1" />
      </svg>
      <div class="font-display text-ink tracking-[0.4em] text-sm">ĐANG MÀI MỰC...</div>
    </div>
  </div>

  <!-- ===== Scripts (thứ tự: data -> scenery -> render -> main) ===== -->
  <script src="js/data.js"></script>
  <script src="js/scenery.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
